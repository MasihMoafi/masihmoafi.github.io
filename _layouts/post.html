---
layout: default
---
<article class="window">
    <a href="{{ '/' | relative_url }}" class="back-link">← Back</a>
    
    <div style="border-bottom: 1px solid var(--border); padding-bottom: 2rem; margin-bottom: 2rem;">
        <h1 class="hero-title hover-chromatic" style="margin-bottom: 1rem;">
            {{ page.title }}
        </h1>
        {% if page.meta %}
        <p class="writeup-meta">{{ page.meta }}</p>
        {% endif %}
        <p class="writeup-meta" style="color: var(--accent); font-weight: bold; margin-top: 1rem;">
            AUTHOR: MASIH MOAFI
        </p>
    </div>

    <div class="writeup-content">
        {{ content }}
    </div>
</article>

<script>
document.addEventListener('DOMContentLoaded', () => {
    // 1. Render all pandoc-generated math spans with KaTeX directly
    document.querySelectorAll('.math.inline, .math.display').forEach(el => {
        const latex = el.textContent;
        const display = el.classList.contains('display');
        try {
            el.innerHTML = katex.renderToString(latex, {
                displayMode: display,
                throwOnError: false
            });
            el.classList.add('katex-rendered');
        } catch(e) {
            console.warn('KaTeX error:', e, latex);
        }
    });

    // 2. Make images clickable (open full-size in new tab)
    document.querySelectorAll('.writeup-content img').forEach(img => {
        if (img.parentElement.tagName !== 'A') {
            const link = document.createElement('a');
            link.href = img.src;
            link.target = '_blank';
            link.style.cursor = 'zoom-in';
            img.parentNode.insertBefore(link, img);
            link.appendChild(img);
        }
    });
});
</script>
